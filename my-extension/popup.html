<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ConsentOS</title>
    <style>
      :root {
        --bg-top: #efe7d8;
        --bg-bottom: #f8f4ec;
        --panel: #fffdf9;
        --ink: #231d14;
        --muted: #6a5f4f;
        --accent: #0f766e;
        --accent-strong: #0b5b55;
        --ring: #c9bba5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 380px;
        color: var(--ink);
        font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-bottom) 100%
        );
        padding: 14px;
      }

      .shell {
        border: 1px solid #d5cab7;
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 14px 28px rgba(57, 42, 19, 0.12);
        overflow: hidden;
      }

      .header {
        padding: 14px 14px 10px;
        background: radial-gradient(
          circle at 80% -30%,
          #badfd8 0%,
          #e8dfcf 72%
        );
        border-bottom: 1px solid #d5cab7;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .title {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .badge {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: rgba(15, 118, 110, 0.13);
        border: 1px solid rgba(15, 118, 110, 0.36);
        color: #0f554f;
        padding: 4px 8px;
        border-radius: 999px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .content {
        padding: 12px;
      }

      .analyze-btn {
        width: 100%;
        border: none;
        background: linear-gradient(135deg, var(--accent) 0%, #155e75 100%);
        color: white;
        font-weight: 700;
        letter-spacing: 0.2px;
        border-radius: 10px;
        padding: 11px 12px;
        margin-bottom: 10px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          filter 0.12s ease;
      }

      .analyze-btn:hover {
        filter: brightness(1.05);
      }

      .analyze-btn:active {
        transform: translateY(1px);
      }

      .analyze-btn:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .status {
        font-size: 12px;
        color: #4f4a41;
        padding: 8px 10px;
        border: 1px solid #ddd2bf;
        background: #f6f1e8;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .section-title {
        margin: 10px 0 6px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: #5f5548;
      }

      .section-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        margin-bottom: 6px;
      }

      .section-row .section-title {
        margin: 0;
      }

      .toggle-btn {
        border: 1px solid #d4c8b3;
        background: #f9f4ea;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        color: #5f5548;
        padding: 4px 10px;
        cursor: pointer;
      }

      .toggle-btn:hover {
        background: #f2ebde;
      }

      .collapsed {
        display: none;
      }

      .panel {
        white-space: pre-wrap;
        border: 1px solid var(--ring);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        color: #322a1e;
      }

      #extractedText {
        font-size: 12px;
        min-height: 80px;
        max-height: 140px;
        overflow-y: auto;
      }

      #output {
        font-family: "Menlo", "Consolas", "Courier New", monospace;
        font-size: 13px;
        min-height: 120px;
        max-height: 220px;
        overflow-y: auto;
      }

      .risk-wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .risk-label {
        font-size: 12px;
        color: #5f5548;
        font-weight: 700;
      }

      .risk-badge {
        border-radius: 999px;
        border: 1px solid #d4c8b3;
        background: #f6f1e8;
        color: #5a5347;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 800;
      }

      .risk-low {
        background: #dff5e8;
        border-color: #92d3ab;
        color: #115936;
      }

      .risk-medium {
        background: #fff1cf;
        border-color: #f2c876;
        color: #7a4a00;
      }

      .risk-high {
        background: #ffdede;
        border-color: #f39b9b;
        color: #7b1d1d;
      }

      .json-key {
        color: #8a4a12;
      }

      .json-string {
        color: #145a7a;
      }

      .json-number {
        color: #8f2149;
      }

      .json-boolean {
        color: #004f49;
      }

      .json-null {
        color: #6d5c41;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="title-row">
          <h2 class="title">ConsentOS</h2>
          <span class="badge">Privacy Lens</span>
        </div>
        <p class="subtitle">
          Scan consent banners and generate a structured risk snapshot.
        </p>
      </header>

      <section class="content">
        <button id="analyzeBtn" class="analyze-btn">Analyze This Page</button>
        <div id="status" class="status">Ready to analyze this tab.</div>

        <div class="section-row">
          <div class="section-title">Extracted Context</div>
          <button
            id="toggleExtractedBtn"
            class="toggle-btn"
            type="button"
            aria-expanded="true"
          >
            Collapse
          </button>
        </div>
        <div id="extractedText" class="panel">
          Extracted text will appear here...
        </div>

        <div class="section-title">AI JSON Summary</div>
        <div class="risk-wrap">
          <span class="risk-label">Risk Score</span>
          <span id="riskBadge" class="risk-badge">N/A</span>
        </div>
        <div id="output" class="panel">Results will appear here...</div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
